<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Awesome Spiking Neural Networks Hub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#141033"/>
      <stop offset="1" stop-color="#0a1e2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="260" y1="120" x2="1020" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6ea8fe" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6ea8fe" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" rx="20" fill="url(#bg)"/>
  <ellipse cx="640" cy="150" rx="560" ry="170" fill="url(#glow)"/>

  <!-- neuron network motif (left) -->
  <g stroke="#8b5cf6" stroke-opacity="0.28" stroke-width="1.4">
    <line x1="70" y1="70"  x2="150" y2="130"/>
    <line x1="70" y1="70"  x2="120" y2="210"/>
    <line x1="150" y1="130" x2="120" y2="210"/>
    <line x1="150" y1="130" x2="230" y2="90"/>
    <line x1="150" y1="130" x2="235" y2="200"/>
    <line x1="120" y1="210" x2="235" y2="200"/>
    <line x1="230" y1="90"  x2="235" y2="200"/>
  </g>
  <g fill="#8b5cf6">
    <circle cx="70"  cy="70"  r="6"/>
    <circle cx="150" cy="130" r="7"/>
    <circle cx="120" cy="210" r="6"/>
    <circle cx="230" cy="90"  r="6"/>
    <circle cx="235" cy="200" r="7"/>
  </g>

  <!-- neuron network motif (right, mirrored) -->
  <g stroke="#22d3ee" stroke-opacity="0.28" stroke-width="1.4">
    <line x1="1210" y1="70"  x2="1130" y2="130"/>
    <line x1="1210" y1="70"  x2="1160" y2="210"/>
    <line x1="1130" y1="130" x2="1160" y2="210"/>
    <line x1="1130" y1="130" x2="1050" y2="90"/>
    <line x1="1130" y1="130" x2="1045" y2="200"/>
    <line x1="1160" y1="210" x2="1045" y2="200"/>
    <line x1="1050" y1="90"  x2="1045" y2="200"/>
  </g>
  <g fill="#22d3ee">
    <circle cx="1210" cy="70"  r="6"/>
    <circle cx="1130" cy="130" r="7"/>
    <circle cx="1160" cy="210" r="6"/>
    <circle cx="1050" cy="90"  r="6"/>
    <circle cx="1045" cy="200" r="7"/>
  </g>

  <!-- kicker -->
  <text x="640" y="98" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#8ea2c8" letter-spacing="8">AWESOME</text>

  <!-- title -->
  <text x="640" y="168" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="800" fill="url(#accent)" letter-spacing="1">Spiking Neural Networks Hub</text>

  <!-- subtitle -->
  <text x="640" y="212" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" fill="#c7d2fe" letter-spacing="0.5">A comprehensive guide to Spiking Neural Networks</text>
  <text x="640" y="242" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#8ea2c8" letter-spacing="3">PAPERS &#183; MODELS &#183; HARDWARE &#183; DATASETS &#183; TOOLS &#183; TEAMS</text>

  <!-- spike train / membrane-potential waveform accent -->
  <path d="M400 284 H500 L516 284 L524 256 L532 284 L590 284 L606 284 L614 242 L622 284 L700 284 L716 284 L724 220 L732 284 L820 284 L836 284 L844 256 L852 284 L880 284"
        fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
  <g fill="#22d3ee">
    <circle cx="524" cy="256" r="3.5"/>
    <circle cx="614" cy="242" r="3.5"/>
    <circle cx="724" cy="220" r="4"/>
    <circle cx="844" cy="256" r="3.5"/>
  </g>
</svg>
