name: diagram

# Re-render the research-ecosystem knowledge graph whenever its Graphviz source
# changes, and commit the resulting SVG back. Edit assets/ecosystem.dot — the
# SVG is generated, never hand-edited. Rendering goes through Kroki so the output
# matches locally-previewed renders (Graphviz + CJK fonts, no runner setup).
on:
  push:
    branches: [main]
    paths:
      - 'assets/ecosystem.dot'
      - '.github/workflows/diagram.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render ecosystem graph (Graphviz via Kroki)
        run: |
          curl -sS --fail-with-body -X POST https://kroki.io/graphviz/svg \
            -H "Content-Type: text/plain" \
            --data-binary @assets/ecosystem.dot \
            -o assets/ecosystem.svg
          # Sanity check: output must be an SVG, not an error page.
          head -c 5 assets/ecosystem.svg | grep -q '<' || { echo "render failed"; cat assets/ecosystem.svg; exit 1; }

      - name: Commit updated SVG
        run: |
          if [ -n "$(git status --porcelain assets/ecosystem.svg)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/ecosystem.svg
            git commit -m "Auto-render ecosystem graph [skip ci]"
            git push
          else
            echo "ecosystem.svg already up to date"
          fi
