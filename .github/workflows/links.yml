name: links

# Catch dead links in the curated list: on every PR/push, and weekly to
# surface links that rot after merge.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Use a browser UA + retries so bot-protected academic hosts (AAAI,
          # ScienceDirect, IEEE, doi) are still checked rather than skipped;
          # accept their rate-limit / bot codes. Genuine 404s still fail the job.
          # Excluded: dynamic badges (star-history, stargazers) and lynxi.com,
          # which refuses connections from CI runners.
          args: >-
            --no-progress
            --max-concurrency 4
            --timeout 30
            --max-retries 3
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            --accept 200,202,206,403,429
            --exclude '^https://api\.star-history\.com/'
            --exclude '^https://www\.lynxi\.com/'
            --exclude '^https://github\.com/haoran-zha/Awesome-Spiking-Neural-Networks-Hub/stargazers$'
            README.md README.zh-CN.md CONTRIBUTING.md .github/PULL_REQUEST_TEMPLATE.md
          fail: true
